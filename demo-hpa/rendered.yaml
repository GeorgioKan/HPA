---
# Source: demo-hpa/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: testrel-demo-hpa
  labels:
    helm.sh/chart: demo-hpa-0.1.0
    app.kubernetes.io/name: demo-hpa
    app.kubernetes.io/instance: testrel
    app.kubernetes.io/version: "1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: demo-hpa
    app.kubernetes.io/instance: testrel
---
# Source: demo-hpa/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testrel-demo-hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-hpa
      app.kubernetes.io/instance: testrel
  template:
    metadata:
      labels:
        app: demo-hpa
    spec:
      containers:
        - name: demo-hpa
          image: "nginx:1.0"
          imagePullPolicy: IfNotPresent
          
          ports:
              containerPort: 80
              
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 100m
              memory: 128Mi
