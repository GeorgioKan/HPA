replicaCount: 1
image:
  repository: nginx
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

components:
  back:
    enabled: true
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 50 
  service:
    enabled: true
    replicaCount: 1
    autoscaling: 
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetMemoryUtilizationPercentage: 75
