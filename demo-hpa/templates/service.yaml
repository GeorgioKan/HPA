apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-hpa.fullname" . }}
  labels:
    {{- include "demo-hpa.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "demo-hpa.selectorLabels" . | nindent 4 }}
