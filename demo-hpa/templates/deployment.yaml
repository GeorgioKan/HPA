apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-hpa.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demo-hpa.selectorLabels" . | nindent 6 }}
  
  template:
    metadata:
      labels:
        {{- include "demo-hpa.selectorLabels" . | nindent 8 }}
        
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          
          ports:
            - name: http
              containerPort: 80
              
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          