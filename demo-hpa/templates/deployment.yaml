apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-hpa.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demo-hpa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "demo-hpa.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          
          ports:
              containerPort: {{ .Values.service.port }}
              
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          